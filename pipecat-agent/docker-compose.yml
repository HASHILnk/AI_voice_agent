services:

  app:
    build: .
    container_name: pipecat-dev

    ports:
      - "7860:7860"

    env_file:
      - .env

    environment:
      - PYTHONUNBUFFERED=1

    volumes:
      - .:/app

    command: uvicorn main:app --host 0.0.0.0 --port 7860 --reload

    depends_on:
      - postgres


  postgres:
    image: postgres:16
    container_name: hotel-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hotel_booking

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: